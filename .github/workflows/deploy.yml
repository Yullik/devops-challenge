name: Build and Deploy Flask App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_URL: 102947735264.dkr.ecr.us-east-1.amazonaws.com/devops-challenge-app
  EC2_INSTANCE_ID: i-0210643717e490cab
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY_URL:$IMAGE_TAG .

      - name: Push Docker image to ECR
        run: |
          docker push $ECR_REPOSITORY_URL:$IMAGE_TAG

      - name: Deploy container to EC2 using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Flask app container" \
            --parameters 'commands=[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 102947735264.dkr.ecr.us-east-1.amazonaws.com",
              "docker pull 102947735264.dkr.ecr.us-east-1.amazonaws.com/devops-challenge-app:latest",
              "docker stop flask-app || true",
              "docker rm flask-app || true",
              "docker run -d --restart unless-stopped --name flask-app -p 5000:5000 102947735264.dkr.ecr.us-east-1.amazonaws.com/devops-challenge-app:latest",
              "docker ps"
            ]' \
            --region us-east-1 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region us-east-1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --region us-east-1